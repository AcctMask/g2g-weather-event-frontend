<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G2G Weather Event Map (ZIP + Grid + NOAA)</title>

  <!-- Leaflet CSS (must load before map renders) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 28, 54, 0.92);
      --panel2: rgba(12, 18, 36, 0.9);
      --text: #e8eefc;
      --muted: rgba(232, 238, 252, 0.7);
      --border: rgba(232, 238, 252, 0.14);
      --accent: #7aa2ff;
      --danger: #ff7a7a;
      --ok: #74d67a;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
    #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }
    #map { width: 100%; height: 100%; }

    .topbar {
      padding: 14px 14px 10px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(15,22,45,.95), rgba(10,14,28,.75));
      border-bottom: 1px solid var(--border);
    }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1.2fr 1fr 1fr 1fr 1fr 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
      min-height: 64px;
    }

    .card label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 10px 10px;
      font-size: 14px;
      outline: none;
    }

    input::placeholder { color: rgba(232,238,252,.45); }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(122,162,255,.18);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: rgba(122,162,255,.26); }
    button.secondary { background: rgba(255,255,255,.08); }
    button.secondary:hover { background: rgba(255,255,255,.12); }

    .pillbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 12px;
    }
    .pill {
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.14);
      padding: 6px 10px;
      border-radius: 999px;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--danger); }

    .tiny {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.25;
    }

    .leaflet-container { background: #0b1020; }
  </style>
</head>

<body>
  <div id="app">
    <div class="topbar">
      <div class="row">
        <div class="card">
          <label>Backend Base URL</label>
          <input id="backend" placeholder="https://g2g-weather-event-backend-1.onrender.com" />
          <div class="tiny">
            Hosted default: <span id="hostedDefault"></span><br/>
            Override with <code>?backend=...</code> in the URL.
          </div>
        </div>

        <div class="card">
          <label>Counties (csv)</label>
          <input id="counties" value="pasco,pinellas,hillsborough,manatee" />
          <div class="tiny">Example: pasco,pinellas,hillsborough</div>
        </div>

        <div class="card">
          <label>Open-Meteo window (days)</label>
          <select id="gridDays">
            <option>7</option>
            <option>14</option>
            <option>21</option>
            <option selected>30</option>
            <option>45</option>
            <option>60</option>
          </select>
        </div>

        <div class="card">
          <label>Grid threshold (mph)</label>
          <input id="gridThreshold" type="number" value="40" />
        </div>

        <div class="card">
          <label>Grid sample (1-9)</label>
          <input id="gridSample" type="number" min="1" max="9" value="9" />
        </div>

        <div class="card">
          <label>NOAA window (days)</label>
          <select id="noaaDays">
            <option selected>2</option>
            <option>3</option>
            <option>5</option>
            <option>7</option>
            <option>14</option>
            <option>30</option>
          </select>
        </div>

        <div class="card">
          <label>NOAA threshold (mph)</label>
          <input id="noaaThreshold" type="number" value="10" />
        </div>

        <div class="card">
          <label>Limit (each layer)</label>
          <input id="limit" type="number" value="200" />
          <div class="pillbar" style="margin-top:8px;">
            <span class="pill">ZIP: <b id="zipCount">0</b></span>
            <span class="pill">Grid: <b id="gridCount">0</b></span>
            <span class="pill">NOAA: <b id="noaaCount">0</b></span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="loadAll">Load ZIP + Grid + NOAA</button>
        <button id="clear" class="secondary">Clear</button>
        <div class="pillbar">
          <span class="pill">Backend: <b id="backendVer">?</b></span>
          <span class="pill"><span id="status" class="ok">Ready.</span></span>
        </div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <!-- IMPORTANT: Load Leaflet JS BEFORE our app script -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);

      function setStatus(msg, isBad=false) {
        const el = $("status");
        el.textContent = msg;
        el.className = isBad ? "bad" : "ok";
      }

      function normalizeBase(url) {
        return (url || "").trim().replace(/\/+$/, "");
      }

      function getParam(name) {
        const u = new URL(window.location.href);
        return u.searchParams.get(name);
      }

      function guessHostedDefault() {
        // Keep this aligned with your backend service
        return "https://g2g-weather-event-backend-1.onrender.com";
      }

      async function fetchJson(url) {
        const r = await fetch(url, { method: "GET" });
        if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
        return await r.json();
      }

      // ---- Guard: if Leaflet didn't load, show a clear message
      if (typeof window.L === "undefined") {
        setStatus("Leaflet failed to load (L is undefined). Check CDN/network.", true);
        return;
      }

      // ---- Map init
      const map = L.map("map", { zoomControl: true }).setView([27.9, -82.5], 8);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      let zipLayer = null;
      let gridLayer = null;
      let noaaLayer = null;

      function clearLayers() {
        [zipLayer, gridLayer, noaaLayer].forEach(l => { if (l) map.removeLayer(l); });
        zipLayer = gridLayer = noaaLayer = null;
        $("zipCount").textContent = "0";
        $("gridCount").textContent = "0";
        $("noaaCount").textContent = "0";
        setStatus("Cleared.");
      }

      function pointToGrid(feature, latlng) {
        return L.circleMarker(latlng, { radius: 5, weight: 1, opacity: 1, fillOpacity: 0.70 });
      }
      function pointToNoaa(feature, latlng) {
        return L.circleMarker(latlng, { radius: 6, weight: 1, opacity: 1, fillOpacity: 0.78 });
      }

      function popupGrid(feature, layer) {
        const p = feature.properties || {};
        const html = `
          <div style="font-family: ui-sans-serif, system-ui; font-size: 13px;">
            <b>Grid event</b><br/>
            <b>Wind:</b> ${p.wind_mph ?? "?"} mph<br/>
            <b>ZIP:</b> ${p.zip ?? ""}<br/>
            <b>County:</b> ${p.county ?? ""}<br/>
            <b>Timestamp:</b> ${p.timestamp ?? ""}<br/>
            <b>Source:</b> ${p.source ?? ""}<br/>
          </div>`;
        layer.bindPopup(html);
      }

      function popupNoaa(feature, layer) {
        const p = feature.properties || {};
        const html = `
          <div style="font-family: ui-sans-serif, system-ui; font-size: 13px;">
            <b>NOAA peak</b><br/>
            <b>Wind:</b> ${p.wind_mph ?? "?"} mph<br/>
            <b>Station:</b> ${p.station_name ?? ""} (${p.station_id ?? ""})<br/>
            <b>ZIP:</b> ${p.zip ?? ""}<br/>
            <b>City:</b> ${p.city ?? ""}, ${p.state ?? ""}<br/>
            <b>County:</b> ${p.county ?? ""}<br/>
            <b>Timestamp:</b> ${p.timestamp ?? ""}<br/>
          </div>`;
        layer.bindPopup(html);
      }

      async function loadVersion(base) {
        try {
          const v = await fetchJson(`${base}/version`);
          $("backendVer").textContent = v.version || "?";
        } catch (e) {
          $("backendVer").textContent = "?";
        }
      }

      async function loadZip(base) {
        // ZIP polygons
        const zcta = await fetchJson(`${base}/zcta.geojson`);
        const meta = await fetchJson(`${base}/zip-meta.json`);

        zipLayer = L.geoJSON(zcta, {
          style: () => ({ weight: 1, opacity: 0.6, fillOpacity: 0.05 }),
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};
            const zip = p.zip || p.ZCTA5CE10 || p.ZCTA5CE20 || "";
            const m = meta && zip ? meta[String(zip)] : null;

            const html = `
              <div style="font-family: ui-sans-serif, system-ui; font-size: 13px;">
                <b>ZIP ${zip}</b><br/>
                ${m ? `<b>City:</b> ${m.city || ""}<br/><b>County:</b> ${m.county || ""}<br/>` : ""}
              </div>`;
            layer.bindPopup(html);
          }
        }).addTo(map);

        $("zipCount").textContent = String((zcta.features || []).length);
        return zipLayer;
      }

      async function loadGrid(base) {
        const counties = $("counties").value.trim();
        const gridDays = $("gridDays").value;
        const gridThreshold = $("gridThreshold").value;
        const gridSample = $("gridSample").value;
        const limit = $("limit").value;

        const gridUrl = `${base}/events.geojson?counties=${encodeURIComponent(counties)}&days=${gridDays}&threshold_mph=${gridThreshold}&sample=${gridSample}&limit=${limit}`;
        const gridFc = await fetchJson(gridUrl);

        gridLayer = L.geoJSON(gridFc, { pointToLayer: pointToGrid, onEachFeature: popupGrid }).addTo(map);
        $("gridCount").textContent = String((gridFc.features || []).length);
      }

      async function loadNoaa(base) {
        const counties = $("counties").value.trim();
        const noaaDays = $("noaaDays").value;
        const noaaThreshold = $("noaaThreshold").value;
        const limit = $("limit").value;

        const noaaUrl = `${base}/noaa.geojson?counties=${encodeURIComponent(counties)}&days=${noaaDays}&threshold_mph=${noaaThreshold}&limit=${limit}`;
        const noaaFc = await fetchJson(noaaUrl);

        noaaLayer = L.geoJSON(noaaFc, { pointToLayer: pointToNoaa, onEachFeature: popupNoaa }).addTo(map);
        $("noaaCount").textContent = String((noaaFc.features || []).length);
      }

      async function loadAll() {
        const base = normalizeBase($("backend").value);
        if (!base) {
          setStatus("Backend URL is empty.", true);
          return;
        }

        clearLayers();
        setStatus("Loading…");

        try {
          await loadVersion(base);
          const zl = await loadZip(base);
          await loadGrid(base);
          await loadNoaa(base);

          try {
            if (zl && zl.getBounds) map.fitBounds(zl.getBounds().pad(0.08));
          } catch (e) {}

          setStatus("Loaded ✓ ZIP + Grid + NOAA");
        } catch (e) {
          console.error(e);
          setStatus(`Error loading layers: ${e.message || e}`, true);
        }
      }

      // Defaults
      const hostedDefault = guessHostedDefault();
      $("hostedDefault").textContent = hostedDefault;

      const qpBackend = getParam("backend");
      $("backend").value = normalizeBase(qpBackend || hostedDefault);

      // Wire buttons
      $("loadAll").onclick = loadAll;
      $("clear").onclick = clearLayers;

      setStatus("Ready.");
    })();
  </script>
</body>
</html>
