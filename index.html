<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>G2G Weather Event Map (ZIP + Grid + NOAA)</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 28, 54, 0.92);
      --panel2: rgba(12, 18, 36, 0.9);
      --text: #e8eefc;
      --muted: rgba(232, 238, 252, 0.7);
      --border: rgba(232, 238, 252, 0.14);
      --accent: #7aa2ff;
      --danger: #ff7a7a;
      --ok: #74d67a;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
    #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }

    .topbar {
      padding: 14px 14px 10px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, rgba(15,22,45,.95), rgba(10,14,28,.75));
      border-bottom: 1px solid var(--border);
    }

    .row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .row2 {
      display: grid;
      grid-template-columns: auto auto auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
    }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10, 14, 28, 0.7);
      color: var(--text);
      outline: none;
      font-family: var(--mono);
      font-size: 13px;
    }

    .btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(122,162,255,.16);
      color: var(--text);
      cursor: pointer;
      font-weight: 650;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(122,162,255,.24); }

    .pillbar {
      display: flex; gap: 8px; flex-wrap: wrap;
      align-items: center;
      padding: 6px 0 0;
    }

    .pill {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .status {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ok);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #map { width: 100%; height: 100%; }

    .muted { color: var(--muted); font-size: 12px; }
    .small { font-size: 12px; }
    .k { color: var(--muted); }
    .v { color: var(--text); font-weight: 600; }
    .sep { height: 1px; background: rgba(255,255,255,.10); margin: 8px 0; }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="row">
        <div class="card">
          <label>Backend Base URL</label>
          <input id="baseUrl" value="" />
          <div class="muted" style="margin-top:6px">
            Hosted default: <span class="k">https://g2g-weather-event-backend-1.onrender.com</span><br/>
            Override with <span class="k">?backend=...</span> in the URL.
          </div>
        </div>

        <div class="card">
          <label>Counties (csv)</label>
          <input id="counties" value="pasco,pinellas,hillsborough,manatee" />
          <div class="muted" style="margin-top:6px">Example: pasco,pinellas,hillsborough</div>
        </div>

        <div class="card">
          <label>Open-Meteo window (days)</label>
          <select id="gridDays">
            <option>2</option><option>7</option><option>14</option><option selected>30</option><option>60</option><option>90</option>
          </select>
        </div>

        <div class="card">
          <label>Grid threshold (mph)</label>
          <input id="gridThreshold" type="number" value="40" />
        </div>

        <div class="card">
          <label>Grid sample (1-9)</label>
          <input id="gridSample" type="number" min="1" max="9" value="9" />
        </div>

        <div class="card">
          <label>NOAA window (days)</label>
          <select id="noaaDays">
            <option selected>2</option><option>7</option><option>14</option><option>30</option><option>60</option><option>90</option>
          </select>
        </div>

        <div class="card">
          <label>NOAA threshold (mph)</label>
          <input id="noaaThreshold" type="number" value="10" />
        </div>

        <div class="card">
          <label>Limit (each layer)</label>
          <input id="limit" type="number" value="200" />
          <div class="pillbar" style="margin-top:8px">
            <span class="pill"><span class="k">ZIP:</span> <b id="zipCount">0</b></span>
            <span class="pill"><span class="k">Grid:</span> <b id="gridCount">0</b></span>
            <span class="pill"><span class="k">NOAA:</span> <b id="noaaCount">0</b></span>
          </div>
        </div>
      </div>

      <div class="row2">
        <button class="btn" id="loadAll">Load ZIP + Grid + NOAA</button>
        <button class="btn" id="clear">Clear</button>
        <span class="pill">Backend: <b id="backendVer">?</b></span>
        <div class="status" id="status">Ready.</div>
      </div>
    </div>

    <div id="map"></div>
  </div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);

  // ---- Backend selection (hosted vs local) ----
  const DEFAULT_BACKEND = "https://g2g-weather-event-backend-1.onrender.com";
  function getQueryParam(name){
    const u = new URL(window.location.href);
    return u.searchParams.get(name);
  }
  function setQueryParam(name, value){
    const u = new URL(window.location.href);
    if (!value) u.searchParams.delete(name);
    else u.searchParams.set(name, value);
    history.replaceState(null, "", u.toString());
  }

  function getBackendBase(){
    const forced = getQueryParam("backend");
    if (forced && forced.trim()) return forced.trim().replace(/\/+$/,"");
    // If hosted on render frontend, default to hosted backend.
    return DEFAULT_BACKEND;
  }

  function setStatus(msg, isError=false){
    const el = $("status");
    el.textContent = msg;
    el.style.color = isError ? "var(--danger)" : "var(--ok)";
  }

  // ---- Map ----
  const map = L.map("map", { zoomControl: true }).setView([27.9, -82.6], 7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let zipLayer = null;
  let gridLayer = null;
  let noaaLayer = null;

  let ZIP_META = null; // { "32606": {...}, ... }

  // ---- Helpers ----
  async function fetchJson(url){
    const res = await fetch(url, { method: "GET" });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText} for ${url}`);
    return res.json();
  }

  function safeStr(v){
    if (v === null || v === undefined) return "";
    return String(v);
  }

  function fmtTs(ts){
    if (!ts) return "";
    const s = String(ts);
    // if ISO, keep it short
    return s.replace("T"," ").replace("Z","").slice(0, 19);
  }

  // ---- Popups ----
  function popupZip(feature, layer){
    const p = feature?.properties || {};
    const zip = p.zip || p.ZCTA5CE10 || p.ZCTA5 || p.postal || "";
    const meta = (ZIP_META && zip && ZIP_META[zip]) ? ZIP_META[zip] : null;

    const county = meta?.county || meta?.County || "";
    const city = meta?.city || meta?.City || "";
    const state = meta?.state || meta?.State || "FL";

    layer.bindPopup(`
      <div class="small">
        <div><span class="k">ZIP:</span> <span class="v">${safeStr(zip)}</span></div>
        ${city ? `<div><span class="k">City:</span> <span class="v">${safeStr(city)}</span></div>` : ``}
        ${county ? `<div><span class="k">County:</span> <span class="v">${safeStr(county)}</span></div>` : ``}
        <div><span class="k">State:</span> <span class="v">${safeStr(state)}</span></div>
      </div>
    `);
  }

  function popupNoaa(feature, layer){
    const p = feature?.properties || {};
    const wind = p.wind_mph ?? p.wind ?? p.mph ?? "";
    const station = p.station_name || p.station || "";
    const stationId = p.station_id || p.id || "";
    const address = p.address || "";
    const zip = p.zip || "";
    const ts = fmtTs(p.timestamp);

    layer.bindPopup(`
      <div class="small">
        <div><span class="v">NOAA peak</span></div>
        <div class="sep"></div>
        <div><span class="k">Wind:</span> <span class="v">${safeStr(wind)}</span> <span class="k">mph</span></div>
        ${ts ? `<div><span class="k">Time:</span> <span class="v">${safeStr(ts)}</span></div>` : ``}
        ${station || stationId ? `<div><span class="k">Station:</span> <span class="v">${safeStr(station || stationId)}</span></div>` : ``}
        ${address ? `<div><span class="k">Address:</span> <span class="v">${safeStr(address)}</span></div>` : ``}
        ${zip ? `<div><span class="k">ZIP:</span> <span class="v">${safeStr(zip)}</span></div>` : ``}
      </div>
    `);
  }

  function popupGrid(feature, layer){
    const p = feature?.properties || {};
    const mph = p.wind_mph ?? p.mph ?? p.wind ?? "";
    const zip = p.zip || "";
    const address = p.address || "";
    const ts = fmtTs(p.timestamp);

    layer.bindPopup(`
      <div class="small">
        <div><span class="v">Grid event</span></div>
        <div class="sep"></div>
        ${mph ? `<div><span class="k">Wind:</span> <span class="v">${safeStr(mph)}</span> <span class="k">mph</span></div>` : ``}
        ${ts ? `<div><span class="k">Time:</span> <span class="v">${safeStr(ts)}</span></div>` : ``}
        ${zip ? `<div><span class="k">ZIP:</span> <span class="v">${safeStr(zip)}</span></div>` : ``}
        ${address ? `<div><span class="k">Address:</span> <span class="v">${safeStr(address)}</span></div>` : ``}
      </div>
    `);
  }

  // ---- Render styles ----
  function pointToGrid(feature, latlng){
    return L.circleMarker(latlng, { radius: 5, weight: 1, opacity: 1, fillOpacity: 0.70 });
  }
  function pointToNoaa(feature, latlng){
    return L.circleMarker(latlng, { radius: 6, weight: 1, opacity: 1, fillOpacity: 0.78 });
  }

  // ZIP polygon style + hover highlight
  const ZIP_STYLE = { weight: 1, opacity: 0.8, fillOpacity: 0.06 };
  const ZIP_HI = { weight: 2, opacity: 1, fillOpacity: 0.12 };

  function onEachZip(feature, layer){
    popupZip(feature, layer);
    layer.on("mouseover", () => layer.setStyle(ZIP_HI));
    layer.on("mouseout", () => layer.setStyle(ZIP_STYLE));
  }

  // ---- Loaders ----
  async function loadBackendVersion(){
    try {
      const base = $("baseUrl").value.trim().replace(/\/+$/,"");
      const v = await fetchJson(`${base}/version`);
      $("backendVer").textContent = v?.version || "?";
    } catch(e){
      $("backendVer").textContent = "?";
    }
  }

  async function loadZip(){
    const base = $("baseUrl").value.trim().replace(/\/+$/,"");
    setStatus("Loading ZIP polygons + zip meta…");

    // pull meta first (cheap) then polygons (big)
    ZIP_META = await fetchJson(`${base}/zip-meta.json`);
    const fc = await fetchJson(`${base}/zcta.geojson`);

    if (zipLayer) map.removeLayer(zipLayer);

    zipLayer = L.geoJSON(fc, { style: ZIP_STYLE, onEachFeature: onEachZip }).addTo(map);
    $("zipCount").textContent = (fc && fc.features) ? fc.features.length : 0;

    return $("zipCount").textContent | 0;
  }

  async function loadGrid(){
    const base = $("baseUrl").value.trim().replace(/\/+$/,"");
    const counties = $("counties").value.trim();
    const gridDays = $("gridDays").value;
    const gridThreshold = $("gridThreshold").value;
    const gridSample = $("gridSample").value;
    const limit = $("limit").value;

    const gridUrl = `${base}/events.geojson?counties=${encodeURIComponent(counties)}&days=${gridDays}&threshold_mph=${gridThreshold}&sample=${gridSample}&limit=${limit}`;
    const gridFc = await fetchJson(gridUrl);

    if (gridLayer) map.removeLayer(gridLayer);
    gridLayer = L.geoJSON(gridFc, { pointToLayer: pointToGrid, onEachFeature: popupGrid }).addTo(map);

    const n = (gridFc && gridFc.features) ? gridFc.features.length : 0;
    $("gridCount").textContent = n;
    return n;
  }

  async function loadNoaa(){
    const base = $("baseUrl").value.trim().replace(/\/+$/,"");
    const counties = $("counties").value.trim();
    const noaaDays = $("noaaDays").value;
    const noaaThreshold = $("noaaThreshold").value;
    const limit = $("limit").value;

    const noaaUrl = `${base}/noaa.geojson?counties=${encodeURIComponent(counties)}&days=${noaaDays}&threshold_mph=${noaaThreshold}&limit=${limit}`;
    const noaaFc = await fetchJson(noaaUrl);

    if (noaaLayer) map.removeLayer(noaaLayer);
    noaaLayer = L.geoJSON(noaaFc, { pointToLayer: pointToNoaa, onEachFeature: popupNoaa }).addTo(map);

    const n = (noaaFc && noaaFc.features) ? noaaFc.features.length : 0;
    $("noaaCount").textContent = n;
    return n;
  }

  async function loadAll(){
    try {
      setStatus("Loading…");
      await loadBackendVersion();

      // ZIP first so map bounds exist + visual context
      const zipN = await loadZip();
      const gridN = await loadGrid();
      const noaaN = await loadNoaa();

      if (zipLayer) {
        map.fitBounds(zipLayer.getBounds().pad(0.06));
      }
      setStatus(`Loaded ZIP=${zipN} | Grid=${gridN} | NOAA=${noaaN}. Share this URL with team.`);
    } catch(e){
      console.error(e);
      setStatus(`Error: ${e.message || e}`, true);
    }
  }

  function clearAll(){
    [zipLayer, gridLayer, noaaLayer].forEach(l => l && map.removeLayer(l));
    zipLayer = gridLayer = noaaLayer = null;
    $("zipCount").textContent = "0";
    $("gridCount").textContent = "0";
    $("noaaCount").textContent = "0";
    setStatus("Cleared.");
  }

  // ---- Init ----
  const initBase = getBackendBase();
  $("baseUrl").value = initBase;

  // keep ?backend= synced when user edits
  $("baseUrl").addEventListener("change", () => {
    const v = $("baseUrl").value.trim().replace(/\/+$/,"");
    setQueryParam("backend", v);
    loadBackendVersion();
  });

  $("loadAll").onclick = loadAll;
  $("clear").onclick = clearAll;

  loadBackendVersion();
})();
</script>
</body>
</html>
